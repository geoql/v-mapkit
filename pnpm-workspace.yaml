packages:
  - "packages/*"
  - "apps/*"

# pnpm 11 blocks all package build scripts by default. The allowBuilds
# map below is security-sensitive — true = postinstall runs; false = skipped.
# Warning: pnpm auto-manages this block. Edits made while pnpm install is
# running may be clobbered. If you see an autogenerated duplicate allowBuilds
# block, remove the duplicate and keep THIS one as source of truth.
# Force the entire workspace onto Vite 8 even though @nuxt/vite-builder
# (Nuxt 4.4.6) declares a "vite": "^7.3.2" peer dependency.
overrides:
  vite: ^8.1.0

allowBuilds:
  "@mongodb-js/zstd": true
  "@parcel/watcher": true
  better-sqlite3: true
  core-js-pure: true
  esbuild: true
  node-liblzma: true
  sharp: true
  unrs-resolver: true
  vue-demi: true
  workerd: true

# Catalogs centralize dependency versions across the monorepo. Sub-packages
# reference these with `catalog:` (default) or `catalog:<name>`. The published
# library (packages/v-mapkit) does NOT use catalogs — npm/yarn/jsr consumers
# don't understand the protocol, so its deps stay real semver. Only the root and
# the apps reference catalogs. Requires pnpm v9.5+ (this repo pins pnpm v11).
catalogs:
  default:
    # Root dev tooling
    "@commitlint/cli": ^21.1.0
    "@commitlint/config-conventional": ^21.1.0
    husky: ^9.1.7
    is-ci: ^4.1.0
    lint-staged: ^17.0.8
    # Shared by both apps
    "@nuxtjs/plausible": ^3.0.2
    nuxt: ^4.4.8
    wrangler: ^4.105.0

  app:docs:
    "@iconify-json/simple-icons": ^1.2.88
    "@lucide/vue": ^1.21.0
    "@nuxt/content": ^3.14.0
    "@nuxt/fonts": ^0.14.0
    "@nuxt/icon": ^2.2.4
    "@nuxtjs/color-mode": ^4.0.1
    "@nuxtjs/tailwindcss": 7.0.0-beta.1
    "@resvg/resvg-wasm": ^2.6.2
    "@vueuse/core": ^14.3.0
    "@vueuse/nuxt": ^14.3.0
    better-sqlite3: ^12.11.1
    class-variance-authority: ^0.7.1
    clsx: ^2.1.1
    nuxt-og-image: ^6.7.0
    oxlint: ^1.71.0
    reka-ui: ^2.10.1
    satori: ^0.26.0
    shadcn-nuxt: ^2.7.4
    tailwind-merge: ^3.6.0
    tailwindcss: ^4.3.1
    tailwindcss-animate: ^1.0.7
    tw-animate-css: ^1.4.0
    typescript: ^6.0.3
    vue: ^3.5.39
    vue-tsc: ^3.3.5

  app:mapkit-cn:
    "@iconify-json/lucide": ^1.2.114
    "@iconify-json/simple-icons": ^1.2.88
    "@nuxt/eslint": ^1.16.0
    "@nuxt/eslint-config": ^1.16.0
    "@nuxt/fonts": ^0.14.0
    "@nuxt/icon": ^2.2.4
    "@nuxtjs/color-mode": ^4.0.1
    # Pinned: only 7.x supports Tailwind v4. Do NOT bump to 6.x.
    "@nuxtjs/tailwindcss": 7.0.0-beta.1
    "@resvg/resvg-wasm": ^2.6.2
    "@tailwindcss/typography": ^0.5.20
    "@vueuse/core": ^14.3.0
    "@vueuse/nuxt": ^14.3.0
    class-variance-authority: ^0.7.1
    clsx: ^2.1.1
    eslint: ^10.6.0
    eslint-plugin-better-tailwindcss: ^4.6.0
    eslint-plugin-oxlint: ^1.71.0
    nuxt-og-image: ^6.7.0
    oxlint: ^1.71.0
    reka-ui: ^2.10.1
    satori: ^0.26.0
    shadcn-nuxt: ^2.7.4
    shiki: ^4.3.0
    tailwind-merge: ^3.6.0
    tailwindcss: ^4.3.1
    tailwindcss-animate: ^1.0.7
    tw-animate-css: ^1.4.0
    typescript: ^6.0.3
    vue: ^3.5.39
    vue-tsc: ^3.3.5
